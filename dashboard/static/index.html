<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thought Distillation Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Thought Distillation</h1>
        <div class="sub">Accuracy over generations · instant + high reasoning · hover for ±CI</div>
      </div>
      <div class="controls">
        <select id="runSelect" title="Select run"></select>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="autoBtn" class="primary" type="button">Auto: ON</button>
        <span id="livePill" class="live-pill offline"><span class="dot"></span><span id="liveText">connecting…</span></span>
      </div>
    </header>

    <section class="card chart-card">
      <div class="title-row">
        <h2>Accuracy over iterations</h2>
        <span class="hint" id="chartHint">Instant + high · hover for ±CI</span>
      </div>
      <div class="chart-wrap chart-wrap-main"><canvas id="accChart"></canvas></div>
      <div class="legend">
        <span><i class="swatch" style="background:var(--heldout)"></i> Instant</span>
        <span><i class="swatch" style="background:var(--high)"></i> High reasoning</span>
        <span><i class="swatch" style="background:#fb923c;border-radius:0;transform:rotate(45deg)"></i> In-progress</span>
      </div>
    </section>

    <footer class="footer">
      <div id="footerLeft">Polling /api/status every 2s</div>
      <div id="footerRight">thought distillation · dashboard</div>
    </footer>
  </div>
</body>
</html>
